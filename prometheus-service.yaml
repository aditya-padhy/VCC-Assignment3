# prometheus-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  selector:
    app: prometheus-server
  ports:
    - name: webui          # <--- Added name here
      protocol: TCP
      port: 9090           # <-- Changed port to 9090 for clarity/convention
      targetPort: 9090
  # type: LoadBalancer      # <-- Changed to NodePort for easier Minikube access
  type: NodePort          # Or use LoadBalancer if `minikube tunnel` is preferred